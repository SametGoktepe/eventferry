packages:
  - "packages/*"

# Transitive dependency overrides — close GitHub Dependabot security alerts
# without waiting for upstream bumps. Set a MIN version (">=X") so newer
# upstreams can still float past it. Remove an entry when the source
# package is updated to pull the patched version on its own.
#
# Tracked alerts (as of 2026-06):
#   undici  → GHSA-vrm6-8vpv-qv8q, -v9p9-hfj2-hcw8, -4992-7rv2-5pvq,
#             -2mjp-6q6p-2qxm, -g9mf-h72j-4rw9  (testcontainers chain)
#   uuid    → GHSA-w5hq-g745-h8pq               (testcontainers/dockerode)
#   ajv     → GHSA-2g4f-4pwh-qvx6               (@kafkajs/confluent-schema-registry)
#   esbuild → GHSA-g7r4-m6w7-qqqr               (vite/vitest dep — Windows dev-server only)
#
# NOT overridden:
#   js-yaml (GHSA-h67p-54hq-rp68) — patched only in 4.2.0+, but the
#     only consumer in our tree is @changesets/cli's transitive
#     read-yaml-file@1.1.0, which calls the v3-only `yaml.safeLoad`
#     API removed in v4. Forcing js-yaml@4 broke `changeset publish`
#     in the release workflow with "Function yaml.safeLoad is removed
#     in js-yaml 4. Use yaml.load instead". The alert touches a
#     CI-only dev-time CLI (no production code path), so we dismiss
#     it instead and wait for read-yaml-file / @manypkg upstreams to
#     migrate. Re-add this override the moment the upstream chain
#     stops pinning js-yaml@3.
#
# Deprecation overrides (no CVE, just noisy pnpm warnings):
#   glob    → 10.5.0 deprecated; force ≥11        (archiver/testcontainers chain)
overrides:
  undici: ">=6.24.0"
  uuid: ">=11.1.1"
  ajv: ">=8.18.0"
  esbuild: ">=0.28.1"
  glob: ">=11.0.0"

# pnpm 11 build-script policy (replaces onlyBuiltDependencies/ignoredBuiltDependencies).
# Every dependency with a lifecycle/postinstall script must be explicitly allowed
# (true = run its build) or disallowed (false); otherwise a fresh `--frozen-lockfile`
# install fails in CI (strictDepBuilds defaults to true).
allowBuilds:
  esbuild: true # used by tsup + vitest
  "@confluentinc/kafka-javascript": false # optional Kafka driver; tests use kafkajs
  cpu-features: false # optional native speedup for ssh2; not needed
  protobufjs: false # postinstall not needed
  ssh2: false # testcontainers uses the Docker socket, not SSH
